services:
  db:
    image: postgres:16
    container_name: crm_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DB_HOST: ${DB_HOST_DOCKER:-db}
      DB_PORT: 5432
      RagApi__BaseUrl: http://fastapi:8000
      InternalApi__ApiKey: ${INTERNAL_API_KEY:-replace-this-in-production}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      - db

  fastapi:
    build:
      context: ..
      dockerfile: Dockerfile.fastapi
    container_name: rag_fastapi
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      CRM_API_BASE_URL: http://backend:8080
      CRM_INTERNAL_API_KEY: ${INTERNAL_API_KEY:-replace-this-in-production}
      CHROMA_DIR: /app/.chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/.chroma
    depends_on:
      - backend

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_CRM_API_URL: http://localhost:${API_PORT:-8080}
    container_name: rag_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
